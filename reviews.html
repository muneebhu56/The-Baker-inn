<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews – The Bakers Inn</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{padding-top:66px}
    #reviews-sec{background:var(--bg)}
    .r-summary{display:grid;grid-template-columns:280px 1fr;gap:3rem;margin-bottom:4rem;align-items:start}
    .r-score-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;text-align:center;position:sticky;top:80px}
    .big-num{font-family:'Syne',sans-serif;font-weight:800;font-size:5rem;color:var(--gold);line-height:1;letter-spacing:-0.03em}
    .big-stars{font-size:1.6rem;color:var(--caramel);letter-spacing:5px;margin:0.4rem 0}
    .r-count{font-size:0.8rem;color:var(--text3);margin-bottom:2rem}
    .bar-row{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.7rem}
    .bar-key{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;color:var(--text2);min-width:12px}
    .bar-track{flex:1;height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(to right,var(--caramel),var(--gold));border-radius:3px}
    .bar-count{font-size:0.7rem;color:var(--text3);min-width:28px;text-align:right}
    .r-filter{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem}
    .r-tab{padding:0.4rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:0.75rem;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif}
    .r-tab:hover{color:var(--text);background:var(--surface)}
    .r-tab.on{background:var(--caramel);color:white;border-color:var(--caramel)}
    .r-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
    .r-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;transition:all 0.3s}
    .r-card:hover{border-color:var(--border2);transform:translateY(-3px)}
    .r-head{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem}
    .r-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
    .r-name{font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:700;color:var(--text)}
    .r-date{font-size:0.7rem;color:var(--text3);margin-top:1px}
    .r-stars{color:var(--caramel);font-size:0.8rem;letter-spacing:2px;margin-bottom:0.7rem}
    .r-text{font-size:0.85rem;color:var(--text2);line-height:1.75;font-style:italic;position:relative;padding-left:1.2rem}
    .r-text::before{content:'"';position:absolute;left:0;top:-0.2rem;font-size:2.5rem;color:var(--text3);font-style:normal;line-height:1}
    .r-platform{display:flex;align-items:center;gap:0.4rem;margin-top:1rem;padding-top:0.8rem;border-top:1px solid var(--border);font-size:0.68rem;color:var(--text3);letter-spacing:0.05em}
    .g-dot{width:7px;height:7px;background:#4285f4;border-radius:50%;flex-shrink:0}
    .r-cta{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:3.5rem;text-align:center;margin-top:4rem}
    .r-cta h2{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text);margin-bottom:0.8rem;letter-spacing:-0.02em}
    .r-cta p{font-size:0.9rem;color:var(--text2);margin-bottom:2rem}
    @media(max-width:1024px){.r-summary{grid-template-columns:1fr;gap:2rem}.r-score-card{position:static}.r-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page-banner">
  <div class="page-banner-bg"><img src="https://images.unsplash.com/photo-1556217477-d325251ece38?w=1400&auto=format&fit=crop" alt="Reviews"/></div>
  <div class="page-banner-content">
    <div class="page-label">858 Reviews</div>
    <h1>What They <em>Say</em></h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Reviews</span></div>
  </div>
</div>
<section id="reviews-sec"><div class="container">
  <div class="r-summary fade-in">
    <div class="r-score-card">
      <div class="big-num">4.3</div>
      <div class="big-stars">★★★★☆</div>
      <div class="r-count">858 Google Reviews</div>
      <div class="bar-row"><span class="bar-key">5</span><div class="bar-track"><div class="bar-fill" style="width:55%"></div></div><span class="bar-count">472</span></div>
      <div class="bar-row"><span class="bar-key">4</span><div class="bar-track"><div class="bar-fill" style="width:25%"></div></div><span class="bar-count">215</span></div>
      <div class="bar-row"><span class="bar-key">3</span><div class="bar-track"><div class="bar-fill" style="width:10%"></div></div><span class="bar-count">86</span></div>
      <div class="bar-row"><span class="bar-key">2</span><div class="bar-track"><div class="bar-fill" style="width:6%"></div></div><span class="bar-count">51</span></div>
      <div class="bar-row"><span class="bar-key">1</span><div class="bar-track"><div class="bar-fill" style="width:4%"></div></div><span class="bar-count">34</span></div>
      <a href="https://maps.google.com" target="_blank" class="btn btn-fill" style="width:100%;justify-content:center;display:flex;margin-top:1.5rem">View on Google</a>
    </div>
    <div>
      <div class="r-filter fade-in">
        <button class="r-tab on" onclick="rFilter('all',this)">All</button>
        <button class="r-tab" onclick="rFilter('5',this)">★★★★★</button>
        <button class="r-tab" onclick="rFilter('4',this)">★★★★☆</button>
      </div>
      <div class="r-grid" id="rGrid"></div>
      <div class="r-cta fade-in">
        <h2>Enjoyed Your Visit?</h2>
        <p>Your feedback helps us serve you better. Leave us a review on Google.</p>
        <a href="https://maps.google.com" target="_blank" class="btn btn-fill">Write a Google Review</a>
      </div>
    </div>
  </div>
</div></section>
<script src="shared.js"></script>
<script>
const revs=[
  {name:"Ayesha K.",date:"2 weeks ago",stars:5,str:"★★★★★",text:"The caramel cake is genuinely the best I've ever had. We order for every birthday and the quality is always consistent. Worth every rupee!",av:"https://i.pravatar.cc/96?img=47"},
  {name:"Muhammad R.",date:"1 month ago",stars:4,str:"★★★★☆",text:"Been coming here since I was a child. The fondant cakes they make are beautiful works of art. My daughter's birthday cake got compliments from everyone.",av:"https://i.pravatar.cc/96?img=11"},
  {name:"Sara N.",date:"3 weeks ago",stars:5,str:"★★★★★",text:"Fresh donuts every single time! The staff is friendly and the bakery always smells heavenly. A must-visit destination in Faisalabad.",av:"https://i.pravatar.cc/96?img=32"},
  {name:"Bilal A.",date:"1 month ago",stars:4,str:"★★★★☆",text:"The bread is baked fresh every day. Never had stale bread from here. Their rusks with chai are a daily ritual in our household.",av:"https://i.pravatar.cc/96?img=15"},
  {name:"Fatima S.",date:"2 months ago",stars:5,str:"★★★★★",text:"Ordered a custom wedding cake — they exceeded every expectation. The design was flawless, the taste unforgettable. Highly recommend for all events!",av:"https://i.pravatar.cc/96?img=56"},
  {name:"Usman T.",date:"3 months ago",stars:5,str:"★★★★★",text:"The Bakers Inn has been part of every Eid and every birthday in our family for 15 years. There's nowhere else we'd go in Faisalabad.",av:"https://i.pravatar.cc/96?img=22"},
  {name:"Hina M.",date:"1 week ago",stars:4,str:"★★★★☆",text:"Great variety, wonderful staff and the pastries are always fresh. The cream pastry is my personal favourite — light and absolutely delicious.",av:"https://i.pravatar.cc/96?img=38"},
  {name:"Tariq B.",date:"2 months ago",stars:5,str:"★★★★★",text:"I moved to Lahore but still order cakes from The Bakers Inn when I visit Faisalabad. Nobody does it like them. Quality that has stood the test of time.",av:"https://i.pravatar.cc/96?img=7"},
];
function renderR(f){const list=f==='all'?revs:revs.filter(r=>r.stars===parseInt(f));document.getElementById('rGrid').innerHTML=list.map(r=>`<div class="r-card fade-in"><div class="r-head"><img class="r-av" src="${r.av}" alt="${r.name}"/><div><div class="r-name">${r.name}</div><div class="r-date">${r.date}</div></div></div><div class="r-stars">${r.str}</div><p class="r-text">${r.text}</p><div class="r-platform"><span class="g-dot"></span>Google Reviews</div></div>`).join('');initFadeIns();}
function rFilter(f,btn){document.querySelectorAll('.r-tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderR(f);}
injectNav('reviews');injectFooter();renderR('all');initFadeIns();
</script></body></html>
