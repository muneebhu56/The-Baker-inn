<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery – The Bakers Inn</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>
  <style>
    body{padding-top:66px}
    #gallery-sec{background:var(--bg)}
    .g-filter{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:3rem;justify-content:center}
    .g-tab{padding:0.45rem 1.1rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:0.78rem;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif}
    .g-tab:hover{background:var(--surface);color:var(--text)}
    .g-tab.on{background:var(--caramel);color:white;border-color:var(--caramel)}
    .masonry{columns:3;column-gap:1rem}
    .m-item{break-inside:avoid;margin-bottom:1rem;border-radius:10px;overflow:hidden;position:relative;cursor:pointer}
    .m-item img{width:100%;display:block;filter:brightness(0.8);transition:transform 0.5s,filter 0.3s}
    .m-item:hover img{transform:scale(1.06);filter:brightness(1)}
    .m-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.8) 0%,transparent 55%);opacity:0;transition:opacity 0.3s;display:flex;align-items:flex-end;padding:1.2rem}
    .m-item:hover .m-over{opacity:1}
    .m-over-text h3{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:white;margin-bottom:2px}
    .m-over-text span{font-size:0.7rem;color:rgba(255,255,255,0.6);letter-spacing:0.08em;text-transform:uppercase}
    /* lightbox */
    .lb{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
    .lb.open{opacity:1;pointer-events:all}
    .lb-img{max-width:85vw;max-height:85vh;object-fit:contain;border-radius:8px}
    .lb-close{position:absolute;top:1.5rem;right:1.5rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
    .lb-close:hover{background:rgba(255,255,255,0.18)}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
    .lb-nav:hover{background:rgba(255,255,255,0.18)}
    .lb-prev{left:1.5rem}.lb-next{right:1.5rem}
    .lb-cap{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:white;font-size:0.85rem;padding:0.5rem 1.2rem;border-radius:20px;white-space:nowrap}
    .g-stats{background:var(--bg2);border-top:1px solid var(--border);padding:3rem 0}
    .g-stats-row{display:grid;grid-template-columns:repeat(4,1fr);text-align:center;gap:1px;background:var(--border)}
    .g-stat{background:var(--bg2);padding:2rem}
    .g-stat-n{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--gold);letter-spacing:-0.02em}
    .g-stat-l{font-size:0.72rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}
    @media(max-width:1024px){.masonry{columns:2}.g-stats-row{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.masonry{columns:1}.lb-nav{display:none}}
  </style>
</head>
<body>
<div class="page-banner">
  <div class="page-banner-bg"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1400&auto=format&fit=crop" alt="Gallery"/></div>
  <div class="page-banner-content">
    <div class="page-label">516+ Photos</div>
    <h1>Our <em>Gallery</em></h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Gallery</span></div>
  </div>
</div>
<section id="gallery-sec"><div class="container">
  <div style="text-align:center;margin-bottom:2.5rem" class="fade-in">
    <div class="tag">A Feast for the Eyes</div>
    <h2 class="h2">Our <em>Creations</em></h2>
  </div>
  <div class="g-filter fade-in">
    <button class="g-tab on" onclick="gFilter('all',this)">All</button>
    <button class="g-tab" onclick="gFilter('cakes',this)">Cakes</button>
    <button class="g-tab" onclick="gFilter('pastries',this)">Pastries</button>
    <button class="g-tab" onclick="gFilter('breads',this)">Breads</button>
    <button class="g-tab" onclick="gFilter('shop',this)">Our Shop</button>
  </div>
  <div class="masonry" id="masonryGrid"></div>
</div>
<div class="g-stats"><div class="container"><div class="g-stats-row">
  <div class="g-stat"><div class="g-stat-n">516+</div><div class="g-stat-l">Photos Shared</div></div>
  <div class="g-stat"><div class="g-stat-n">37</div><div class="g-stat-l">Years of Art</div></div>
  <div class="g-stat"><div class="g-stat-n">200+</div><div class="g-stat-l">Cake Designs</div></div>
  <div class="g-stat"><div class="g-stat-n">∞</div><div class="g-stat-l">Smiles Created</div></div>
</div></div></div>
</section>
<div class="lb" id="lb">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img class="lb-img" id="lbImg" src="" alt=""/>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-cap" id="lbCap"></div>
</div>
<script src="shared.js"></script>
<script>
const photos=[
  {cat:'cakes',title:'Caramel Dream',label:'Signature Cake',img:'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&auto=format&fit=crop'},
  {cat:'pastries',title:'Fresh Pastries',label:'Daily Bakes',img:'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&auto=format&fit=crop'},
  {cat:'pastries',title:'Glazed Donuts',label:'Customer Fav',img:'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=800&auto=format&fit=crop'},
  {cat:'breads',title:'Artisan Sourdough',label:'Freshly Baked',img:'https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=800&auto=format&fit=crop'},
  {cat:'pastries',title:'Butter Cookies',label:'Classic Bake',img:'https://images.unsplash.com/photo-1486427944299-d1955d23e34d?w=800&auto=format&fit=crop'},
  {cat:'cakes',title:'Fondant Cake',label:'Custom Design',img:'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&auto=format&fit=crop'},
  {cat:'shop',title:'Our Bakery',label:'People\'s Colony',img:'https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=800&auto=format&fit=crop'},
  {cat:'cakes',title:'Chocolate Truffle',label:'Premium Cake',img:'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=800&auto=format&fit=crop'},
  {cat:'breads',title:'Morning Loaf',label:'Daily Bread',img:'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=800&auto=format&fit=crop'},
  {cat:'cakes',title:'Red Velvet',label:'Celebration Cake',img:'https://images.unsplash.com/photo-1586985289688-ca3cf47d3e6e?w=800&auto=format&fit=crop'},
  {cat:'shop',title:'Fresh Counter',label:'Daily Display',img:'https://images.unsplash.com/photo-1556217477-d325251ece38?w=800&auto=format&fit=crop'},
  {cat:'pastries',title:'Croissants',label:'Morning Bake',img:'https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=800&auto=format&fit=crop'},
];
let fp=[...photos],ci=0;
function renderG(f){fp=f==='all'?photos:photos.filter(p=>p.cat===f);document.getElementById('masonryGrid').innerHTML=fp.map((p,i)=>`<div class="m-item fade-in" onclick="openLB(${i})"><img src="${p.img}" alt="${p.title}" loading="lazy"/><div class="m-over"><div class="m-over-text"><h3>${p.title}</h3><span>${p.label}</span></div></div></div>`).join('');initFadeIns();}
function gFilter(f,btn){document.querySelectorAll('.g-tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderG(f);}
function openLB(i){ci=i;document.getElementById('lbImg').src=fp[i].img;document.getElementById('lbCap').textContent=fp[i].title+' — '+fp[i].label;document.getElementById('lb').classList.add('open');}
document.getElementById('lbClose').onclick=()=>document.getElementById('lb').classList.remove('open');
document.getElementById('lbPrev').onclick=()=>{ci=(ci-1+fp.length)%fp.length;openLB(ci);};
document.getElementById('lbNext').onclick=()=>{ci=(ci+1)%fp.length;openLB(ci);};
document.getElementById('lb').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')document.getElementById('lb').classList.remove('open');if(e.key==='ArrowLeft'){ci=(ci-1+fp.length)%fp.length;openLB(ci);}if(e.key==='ArrowRight'){ci=(ci+1)%fp.length;openLB(ci);}});
injectNav('gallery');injectFooter();renderG('all');initFadeIns();
</script><script src="animations.js"></script>
</body></html>
