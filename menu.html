<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu – The Bakers Inn</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>
  <style>
    body{padding-top:66px}
    #menu-sec{background:var(--bg)}
    .filter-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:3rem;align-items:center}
    .f-tab{padding:0.45rem 1.1rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:0.78rem;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif}
    .f-tab:hover{background:var(--surface);color:var(--text)}
    .f-tab.on{background:var(--caramel);color:white;border-color:var(--caramel)}
    .m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    .m-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;cursor:pointer}
    .m-card:hover{border-color:var(--border2);transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,0.5)}
    .m-img{height:220px;overflow:hidden;position:relative}
    .m-img img{width:100%;height:100%;object-fit:cover;filter:brightness(0.75);transition:transform 0.5s,filter 0.4s}
    .m-card:hover .m-img img{transform:scale(1.07);filter:brightness(0.9)}
    .m-chip{position:absolute;top:1rem;left:1rem;background:rgba(14,12,10,0.8);backdrop-filter:blur(8px);border:1px solid var(--border2);color:var(--gold);padding:0.2rem 0.65rem;font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-radius:5px}
    .m-body{padding:1.3rem}
    .m-body h3{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:0.35rem}
    .m-body p{font-size:0.78rem;color:var(--text3);line-height:1.6;margin-bottom:1rem}
    .m-foot{display:flex;align-items:center;justify-content:space-between}
    .m-price{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)}
    .m-stars{color:var(--caramel);font-size:0.72rem;letter-spacing:2px}
    /* popup */
    .popup-bg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.88);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
    .popup-bg.open{opacity:1;pointer-events:all}
    .popup-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:480px;width:92%;overflow:hidden;position:relative;transform:scale(0.93);transition:transform 0.3s}
    .popup-bg.open .popup-box{transform:scale(1)}
    .popup-img{height:260px;overflow:hidden}
    .popup-img img{width:100%;height:100%;object-fit:cover;filter:brightness(0.7)}
    .popup-body{padding:2rem}
    .popup-body h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:0.3rem}
    .popup-tag{font-size:0.68rem;color:var(--caramel);letter-spacing:0.1em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:0.8rem}
    .popup-body p{font-size:0.88rem;color:var(--text2);line-height:1.7;margin-bottom:1.5rem}
    .popup-foot{display:flex;align-items:center;justify-content:space-between}
    .popup-price{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold)}
    .popup-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.08);border:1px solid var(--border2);color:var(--text2);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
    .popup-close:hover{background:rgba(255,255,255,0.15)}
    @media(max-width:600px){.m-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page-banner">
  <div class="page-banner-bg"><img src="https://images.unsplash.com/photo-1486427944299-d1955d23e34d?w=1400&auto=format&fit=crop" alt="Menu"/></div>
  <div class="page-banner-content">
    <div class="page-label">What We Bake</div>
    <h1>Our <em>Menu</em></h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Menu</span></div>
  </div>
</div>
<section id="menu-sec"><div class="container">
  <div class="filter-row fade-in">
    <button class="f-tab on" onclick="doFilter('all',this)">All</button>
    <button class="f-tab" onclick="doFilter('cakes',this)">Cakes</button>
    <button class="f-tab" onclick="doFilter('pastries',this)">Pastries</button>
    <button class="f-tab" onclick="doFilter('bread',this)">Breads</button>
    <button class="f-tab" onclick="doFilter('cookies',this)">Cookies & Rusks</button>
    <button class="f-tab" onclick="doFilter('snacks',this)">Snacks</button>
  </div>
  <div class="m-grid" id="mGrid"></div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:3rem;text-align:center;margin-top:4rem" class="fade-in">
    <div class="tag">Custom Orders</div>
    <h2 class="h2" style="margin-top:0.8rem;margin-bottom:1rem">Want Something <em>Bespoke?</em></h2>
    <p class="body-lg" style="max-width:500px;margin:0 auto 2rem">Design your own cake using our builder, or call us directly for custom wedding, event and bulk orders.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <a href="builder.html" class="btn btn-fill">Open Cake Builder →</a>
      <a href="contact.html" class="btn btn-ghost">Contact Us</a>
    </div>
  </div>
</div></section>
<div class="popup-bg" id="popup">
  <div class="popup-box">
    <button class="popup-close" id="pClose">✕</button>
    <div class="popup-img"><img id="pImg" src="" alt=""/></div>
    <div class="popup-body">
      <h2 id="pName"></h2><span class="popup-tag" id="pTag"></span>
      <p id="pDesc"></p>
      <div class="popup-foot"><span class="popup-price" id="pPrice"></span><a href="contact.html" class="btn btn-fill btn-sm">Order Now</a></div>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const items=[
  {id:1,name:"Caramel Dream Cake",cat:"cakes",tag:"Bestseller",price:"PKR 1,800",stars:"★★★★★",desc:"Signature caramel layered cake with velvety cream and house-made caramel drizzle. Our most reviewed item in 37 years.",img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600&auto=format&fit=crop"},
  {id:2,name:"Fondant Birthday Cake",cat:"cakes",tag:"Custom",price:"PKR 3,500+",stars:"★★★★★",desc:"Sculpted fondant cakes for every milestone. Birthdays, anniversaries, baby showers — your vision, our craft.",img:"https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=600&auto=format&fit=crop"},
  {id:3,name:"Chocolate Truffle Cake",cat:"cakes",tag:"Premium",price:"PKR 2,400",stars:"★★★★★",desc:"Decadent dark chocolate sponge layered with silky ganache and finished with a mirror-smooth chocolate glaze.",img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600&auto=format&fit=crop"},
  {id:4,name:"Red Velvet Cake",cat:"cakes",tag:"Classic",price:"PKR 2,100",stars:"★★★★☆",desc:"Soft crimson layers with house cream cheese frosting. A timeless celebration favourite.",img:"https://images.unsplash.com/photo-1586985289688-ca3cf47d3e6e?w=600&auto=format&fit=crop"},
  {id:5,name:"Glazed Donuts",cat:"pastries",tag:"Fresh Daily",price:"PKR 120",stars:"★★★★☆",desc:"Fluffy, golden-fried donuts glazed with vanilla or chocolate. Never more than 45 minutes from the fryer.",img:"https://images.unsplash.com/photo-1551024601-bec78aea704b?w=600&auto=format&fit=crop"},
  {id:6,name:"Cream Pastry",cat:"pastries",tag:"Popular",price:"PKR 180",stars:"★★★★★",desc:"Layers of flaky pastry filled with fresh whipped cream and topped with seasonal fruit.",img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&auto=format&fit=crop"},
  {id:7,name:"Butter Croissant",cat:"pastries",tag:"Morning Fav",price:"PKR 160",stars:"★★★★☆",desc:"Buttery, flaky croissants baked to a golden crisp every morning. Plain, almond or chocolate-filled.",img:"https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=600&auto=format&fit=crop"},
  {id:8,name:"Artisan Sourdough",cat:"bread",tag:"Baked Fresh",price:"PKR 350",stars:"★★★★★",desc:"Slow-fermented 24 hours, baked to a perfect golden crust with a chewy open crumb.",img:"https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=600&auto=format&fit=crop"},
  {id:9,name:"Multigrain Loaf",cat:"bread",tag:"Healthy",price:"PKR 280",stars:"★★★★☆",desc:"Packed with seeds and whole grains. Hearty, nutritious and flavourful for daily family use.",img:"https://images.unsplash.com/photo-1509440159596-0249088772ff?w=600&auto=format&fit=crop"},
  {id:10,name:"Butter Cookies",cat:"cookies",tag:"Classic",price:"PKR 250/pack",stars:"★★★★☆",desc:"Melt-in-your-mouth butter cookies baked daily. Perfect for gifting or chai time. Sold by the dozen.",img:"https://images.unsplash.com/photo-1486427944299-d1955d23e34d?w=600&auto=format&fit=crop"},
  {id:11,name:"Golden Rusks",cat:"cookies",tag:"Traditional",price:"PKR 200/pack",stars:"★★★★☆",desc:"Double-baked golden rusks, crisp and perfect. An Eid staple in every Faisalabad household.",img:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=600&auto=format&fit=crop"},
  {id:12,name:"Tikka Biscuits",cat:"snacks",tag:"Savoury",price:"PKR 180/pack",stars:"★★★★☆",desc:"Crispy, spiced biscuits with a rich tikka flavour. Our most popular savoury snack for chai time.",img:"https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=600&auto=format&fit=crop"},
];
function render(f){
  const g=document.getElementById('mGrid');
  const list=f==='all'?items:items.filter(i=>i.cat===f);
  g.innerHTML=list.map(i=>`<div class="m-card fade-in" onclick="openP(${i.id})"><div class="m-img"><img src="${i.img}" alt="${i.name}" loading="lazy"/><span class="m-chip">${i.tag}</span></div><div class="m-body"><h3>${i.name}</h3><p>${i.desc.substring(0,80)}...</p><div class="m-foot"><span class="m-price">${i.price}</span><span class="m-stars">${i.stars}</span></div></div></div>`).join('');
  initFadeIns();
}
function doFilter(f,btn){document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render(f);}
function openP(id){const i=items.find(x=>x.id===id);document.getElementById('pImg').src=i.img;document.getElementById('pName').textContent=i.name;document.getElementById('pTag').textContent=i.tag;document.getElementById('pDesc').textContent=i.desc;document.getElementById('pPrice').textContent=i.price;document.getElementById('popup').classList.add('open');}
document.getElementById('pClose').onclick=()=>document.getElementById('popup').classList.remove('open');
document.getElementById('popup').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
injectNav('menu');injectFooter();render('all');initFadeIns();
</script><script src="animations.js"></script>
</body></html>
